	<meta name="theme-color" id="theme-color-meta" content="#dcdde1" />
	<script>
		// Three-state theme control: "auto" follows the OS (and keeps following
		// it live), "light"/"dark" pin a choice. Applied before paint to avoid a
		// flash of the wrong colors. "auto" is represented by no stored value.
		(function () {
			var mq = window.matchMedia("(prefers-color-scheme: dark)");
			function storedMode() {
				try { return localStorage.getItem("theme") || "auto"; } catch (e) { return "auto"; }
			}
			function systemTheme() {
				return mq.matches ? "dark" : "light";
			}
			function apply(mode) {
				var theme = mode === "auto" ? systemTheme() : mode;
				var root = document.documentElement;
				root.setAttribute("data-theme", theme);
				root.setAttribute("data-theme-mode", mode);
				root.classList.add("js");
				var meta = document.getElementById("theme-color-meta");
				if (meta) meta.setAttribute("content", theme === "dark" ? "#1e2027" : "#dcdde1");
				var btn = document.getElementById("theme-toggle");
				if (btn) btn.title = "Theme: " + mode;
			}
			apply(storedMode());
			// Follow OS changes live, but only while the mode is "auto".
			function onSystemChange() {
				if (storedMode() === "auto") apply("auto");
			}
			if (mq.addEventListener) mq.addEventListener("change", onSystemChange);
			else if (mq.addListener) mq.addListener(onSystemChange);
			window.__cycleTheme = function () {
				var order = ["auto", "light", "dark"];
				var next = order[(order.indexOf(storedMode()) + 1) % order.length];
				try {
					if (next === "auto") localStorage.removeItem("theme");
					else localStorage.setItem("theme", next);
				} catch (e) {}
				apply(next);
			};
		})();
	</script>
